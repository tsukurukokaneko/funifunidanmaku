<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東方桜夢 〜 Blossoming Phantom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#160f1c; --night2:#241629; --plum:#3a2540;
    --sakura:#f6c2d6; --sakura2:#e98fb2; --sakura-deep:#c9648c;
    --paper:#f4ecec; --gold:#d8b48a; --ink:#2a2030;
    --white:#fff6fb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2e1c34 0%, var(--night) 55%, #0d0912 100%);
    color:var(--paper);
    font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Kosugi Maru","Rounded Mplus 1c",sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100%; padding:14px;
    overflow:hidden;
  }
  .mincho{ font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Kosugi Maru","Rounded Mplus 1c",sans-serif; font-weight:700; }

  .stage{
    display:flex; gap:16px; align-items:stretch;
    max-width:980px; width:100%;
  }
  .fieldwrap{
    position:relative; flex:0 0 auto;
    border-radius:6px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(246,194,214,.18), 0 24px 60px rgba(0,0,0,.55);
  }
  canvas#game{ display:block; background:#0d0812; width:auto; height:auto;
    max-height:78vh; aspect-ratio:480/640; }

  /* vertical spell banner overlaid on field */
  .spellname{
    position:absolute; top:14px; right:10px;
    writing-mode:vertical-rl; text-orientation:upright;
    font-size:20px; letter-spacing:6px;
    color:var(--sakura); text-shadow:0 0 12px rgba(233,143,178,.8), 0 2px 4px #000;
    opacity:0; transform:translateX(8px); transition:opacity .5s, transform .5s;
    pointer-events:none; font-weight:600;
  }
  .spellname.show{ opacity:1; transform:translateX(0); }

  /* side panel */
  .panel{
    flex:1 1 260px; min-width:230px; max-width:320px;
    display:flex; flex-direction:column; gap:12px;
    padding:4px 2px;
  }
  .card{
    position:relative; border-radius:6px; overflow:hidden;
    background:linear-gradient(160deg,#241629,#180f1d);
    border:1px solid rgba(246,194,214,.16);
    padding:12px 12px 10px;
  }
  .portrait{
    width:100%; aspect-ratio:620/869; object-fit:contain;
    filter:drop-shadow(0 0 16px rgba(233,143,178,.25));
  }
  .bosslabel{ text-align:center; margin-top:2px; }
  .bosslabel .en{ font-size:11px; letter-spacing:3px; color:var(--gold); opacity:.85;}
  .bosslabel .jp{ font-size:19px; letter-spacing:4px; color:var(--white); margin-top:2px;}
  .bosslabel .sub{ font-size:11px; color:var(--sakura2); letter-spacing:2px; margin-top:3px;}

  .hpwrap{ margin-top:10px; }
  .hpbar{ height:7px; border-radius:4px; background:rgba(255,255,255,.10); overflow:hidden;}
  .hpfill{ height:100%; width:100%;
    background:linear-gradient(90deg,var(--sakura-deep),var(--sakura));
    transition:width .12s linear;}
  .pips{ display:flex; gap:5px; margin-top:7px;}
  .pip{ flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.10);}
  .pip.on{ background:var(--gold);}

  .stats{ display:grid; grid-template-columns:auto 1fr; gap:6px 10px; font-size:13px;}
  .stats .k{ color:var(--sakura2); letter-spacing:1px;}
  .stats .v{ text-align:right; font-variant-numeric:tabular-nums; color:var(--white);}
  .hearts{ letter-spacing:2px; }

  .legend{ font-size:11.5px; line-height:1.7; color:#c7b6c6;}
  .legend b{ color:var(--sakura); font-weight:600;}

  /* compact mobile HUD (top of screen) */
  .mhud{ display:none; width:min(94vw,440px);
    background:linear-gradient(160deg,#241629,#180f1d);
    border:1px solid rgba(246,194,214,.16); border-radius:6px; padding:8px 12px 9px;}
  .mhud-name{ font-size:16px; letter-spacing:2px; color:var(--sakura);
    text-shadow:0 0 10px rgba(233,143,178,.5); margin-bottom:5px; line-height:1.25;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .mhud-row{ display:flex; gap:14px; align-items:baseline; margin-bottom:6px;}
  .mhud-stat{ font-size:12px; color:var(--sakura2); letter-spacing:1px; white-space:nowrap;}
  .mhud-stat b{ letter-spacing:2px; color:var(--white); font-size:13px;}
  .mhud-stat.sc{ margin-left:auto; color:#cdbcc9;}
  .mhud-stat.sc b{ color:#e8d6e4;}
  .mhud .hpbar{ height:6px;}
  .mhud .pips{ margin-top:6px;}

  /* touch controls */
  .touchbar{ display:none; gap:10px; margin-top:2px;}
  .tbtn{ flex:1; padding:14px 0; text-align:center; border-radius:8px;
    background:rgba(246,194,214,.10); border:1px solid rgba(246,194,214,.25);
    color:var(--sakura); font-size:14px; letter-spacing:2px; user-select:none;}
  .tbtn:active{ background:rgba(246,194,214,.24);}
  .tbtn.armed{ background:rgba(246,194,214,.30); color:#fff;}

  /* overlays */
  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:radial-gradient(70% 70% at 50% 40%, rgba(36,22,41,.78), rgba(8,5,12,.92));
    backdrop-filter:blur(2px); padding:24px; gap:14px;}
  .overlay.hidden{ display:none;}
  .title{ font-size:38px; letter-spacing:10px; color:var(--white);
    text-shadow:0 0 22px rgba(233,143,178,.55); }
  .title small{ display:block; font-size:13px; letter-spacing:6px; color:var(--gold);
    margin-top:10px; font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Kosugi Maru",sans-serif;}
  .ov-sub{ font-size:13px; color:#d6c3d2; line-height:1.9; letter-spacing:1px; max-width:340px;}
  .ov-sub b{ color:var(--sakura); }
  .startbtn{ margin-top:6px; padding:13px 34px; font-size:16px; letter-spacing:4px;
    color:#2a1622; background:linear-gradient(90deg,var(--sakura),#f5d8e4);
    border:none; border-radius:30px; cursor:pointer;
    box-shadow:0 8px 24px rgba(233,143,178,.4);}
  .startbtn:active{ transform:translateY(1px);}
  .result{ font-size:30px; letter-spacing:8px; }
  .result.win{ color:var(--sakura); text-shadow:0 0 20px rgba(233,143,178,.7);}
  .result.lose{ color:#cdbcc9;}

  @media (max-width:760px){
    body{ padding:6px; align-items:center; justify-content:center; overflow:hidden;}
    /* stage fills exactly one screen; HUD + buttons keep their size,
       canvas takes whatever space is left so nothing is clipped */
    .stage{ flex-direction:column; gap:8px; align-items:center;
      width:100%;
      height:calc(100vh - 12px);
      height:calc(100dvh - 12px);
    }
    .mhud{ display:block; order:0; flex:0 0 auto;}
    .spellname{ display:none;}
    .fieldwrap{ order:1; width:auto; flex:1 1 auto; min-height:0;
      display:flex; align-items:center; justify-content:center;}
    canvas#game{
      width:auto; height:100%; max-height:100%; max-width:94vw;
      aspect-ratio:480/640;
    }
    .panel{ order:2; width:min(94vw,440px); max-width:none; flex:0 0 auto;
      flex-direction:column; gap:8px; min-width:0;}
    .card.charcard, .card.statcard, .legend{ display:none;}
    .touchbar{ display:flex; gap:12px;}
    .tbtn{ padding:18px 0; font-size:16px; letter-spacing:5px;}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="mhud" id="mhud">
    <div class="mhud-name mincho" id="mAtkName">—</div>
    <div class="mhud-row">
      <span class="mhud-stat">残機 <b id="mLives"></b></span>
      <span class="mhud-stat">ボム <b id="mBombs"></b></span>
      <span class="mhud-stat sc">SCORE <b id="mScore">0</b></span>
    </div>
    <div class="hpbar"><div class="hpfill" id="mHpfill"></div></div>
    <div class="pips" id="mPips"></div>
  </div>

  <div class="fieldwrap">
    <canvas id="game" width="480" height="640"></canvas>
    <div class="spellname mincho" id="spellname"></div>

    <div class="overlay" id="ovTitle">
      <div class="title mincho">東方桜夢<small>〜 BLOSSOMING PHANTOM</small></div>
      <div class="ov-sub mincho">
        ふにふに舞うお花見桜を避けよう
      </div>
      <button class="startbtn mincho" id="startBtn">は じ め る</button>
      <div class="ov-sub" style="font-size:11.5px;opacity:.8">
        移動：矢印 / WASD　集中：Shift　霊撃：X<br>
        （スマホは画面ドラッグで移動・下のボタンで集中／霊撃）
      </div>
    </div>

    <div class="overlay hidden" id="ovEnd">
      <div class="result mincho" id="resultText"></div>
      <div class="ov-sub mincho" id="resultSub"></div>
      <button class="startbtn mincho" id="retryBtn">も う い ち ど</button>
    </div>
  </div>

  <div class="panel">
    <div class="card charcard">
      <div class="bosslabel">
        <div class="en">FUNI-SAN</div>
        <div class="jp mincho">ふにさん</div>
        <div class="sub mincho">ふにふにする程度の能力</div>
        <div class="hpwrap">
          <div class="hpbar"><div class="hpfill" id="hpfill"></div></div>
          <div class="pips" id="pips"></div>
        </div>
      </div>
    </div>

    <div class="card statcard">
      <div class="stats">
        <div class="k mincho">符号</div><div class="v mincho" id="atkName">—</div>
        <div class="k">SCORE</div><div class="v" id="score">0</div>
        <div class="k">GRAZE</div><div class="v" id="graze">0</div>
        <div class="k">残機</div><div class="v hearts" id="lives" style="color:var(--sakura2)"></div>
        <div class="k">霊撃</div><div class="v hearts" id="bombs" style="color:var(--gold)"></div>
      </div>
    </div>

    <div class="card legend">
      <b>そうさ</b><br>
      移動：矢印キー / WASD<br>
      集中（低速・判定表示）：Shift<br>
      霊撃（ボム・弾消し）：X<br>
      射撃は自動。花びらに掠るとGRAZE。
    </div>

    <div class="touchbar">
      <div class="tbtn mincho" id="tFocus">低速</div>
      <div class="tbtn mincho" id="tBomb">霊撃</div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

/* ---------- sprite pre-render ---------- */
function makePetal(c1, c2, size){
  const s = size, cnv = document.createElement('canvas');
  cnv.width = cnv.height = s; const g = cnv.getContext('2d');
  g.translate(s/2, s/2);
  // sakura petal: rounded teardrop with a soft notch
  const grd = g.createLinearGradient(0,-s/2,0,s/2);
  grd.addColorStop(0,c1); grd.addColorStop(1,c2);
  g.fillStyle = grd;
  g.shadowColor = c1; g.shadowBlur = s*0.35;
  g.beginPath();
  g.moveTo(0, -s*0.42);
  g.bezierCurveTo(s*0.34,-s*0.30, s*0.30,s*0.30, 0,s*0.42);
  g.bezierCurveTo(-s*0.30,s*0.30, -s*0.34,-s*0.30, 0,-s*0.42);
  g.fill();
  // notch
  g.shadowBlur=0;
  g.globalCompositeOperation='destination-out';
  g.beginPath(); g.moveTo(0,s*0.42); g.lineTo(-s*0.10,s*0.30); g.lineTo(s*0.10,s*0.30); g.closePath(); g.fill();
  g.globalCompositeOperation='source-over';
  return cnv;
}
function makeOrb(core, glow, size){
  const s=size, cnv=document.createElement('canvas');
  cnv.width=cnv.height=s; const g=cnv.getContext('2d');
  const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,'#ffffff');
  grd.addColorStop(0.45,core);
  grd.addColorStop(1,glow);
  g.fillStyle=grd; g.beginPath(); g.arc(s/2,s/2,s/2,0,7); g.fill();
  return cnv;
}
const SPR = {
  petalPink:  makePetal('#ffd7e6','#e98fb2',20),
  petalWhite: makePetal('#ffffff','#f3c8da',20),
  petalDeep:  makePetal('#f7b6cf','#c9648c',22),
  orbWhite:   makeOrb('#ffd9e8','rgba(233,143,178,0)',16),
  orbPink:    makeOrb('#f8a9c6','rgba(201,100,140,0)',16),
};

const portraitImg = new Image();
portraitImg.src = BOSS_SPRITE;
let portraitReady=false;
portraitImg.onload=()=>portraitReady=true;

/* ---------- input ---------- */
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()]=true;
  if(e.key==='Shift') keys['shift']=true;
});
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; if(e.key==='Shift') keys['shift']=false;});

let touch={active:false, x:0, y:0, focus:false};
function canvasPos(clientX,clientY){
  const r=cv.getBoundingClientRect();
  return {x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height)};
}
cv.addEventListener('touchstart',e=>{e.preventDefault(); const t=e.touches[0]; const p=canvasPos(t.clientX,t.clientY); touch.active=true; touch.px=p.x; touch.py=p.y;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault(); const t=e.touches[0]; const p=canvasPos(t.clientX,t.clientY);
  if(touch.active){ player.x+=(p.x-touch.px); player.y+=(p.y-touch.py);} touch.px=p.x; touch.py=p.y;},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault(); if(e.touches.length===0) touch.active=false;},{passive:false});
const tFocus=document.getElementById('tFocus'), tBomb=document.getElementById('tBomb');
tFocus.addEventListener('touchstart',e=>{e.preventDefault(); touch.focus=true; tFocus.classList.add('armed');},{passive:false});
tFocus.addEventListener('touchend',e=>{e.preventDefault(); touch.focus=false; tFocus.classList.remove('armed');},{passive:false});
tBomb.addEventListener('touchstart',e=>{e.preventDefault(); fireBomb();},{passive:false});

/* ---------- game state ---------- */
let state='title';
let frame=0;
const player={x:W/2,y:H-90,r:2.6,fireCd:0,invuln:120,focus:false,deathT:0};
let pbullets=[], ebullets=[], sparks=[], bgpetals=[], floatPetals=[];
let score=0, graze=0, lives=3, bombs=3;
let bossFlash=0, fieldFlash=0;
let cutin={t:0,dur:0,name:''};   // spell-card stand-in cut-in

/* ambient background petals */
for(let i=0;i<26;i++) bgpetals.push(newBgPetal(Math.random()*H));
function newBgPetal(y){ return {x:Math.random()*W,y:y,vy:0.3+Math.random()*0.5,vx:(Math.random()-0.5)*0.4,
  s:8+Math.random()*10, rot:Math.random()*7, vr:(Math.random()-0.5)*0.04, a:0.10+Math.random()*0.18}; }

/* ---------- boss & attacks ---------- */
const boss={x:W/2,y:150,baseX:W/2,hp:0,hpMax:1,timer:0,idx:0,defeated:false,intro:60,bob:0,deathT:0,alive:true};

function aim(){ return Math.atan2(player.y-boss.y, player.x-boss.x); }
function fireE(x,y,ang,sp,spr,r,extra){
  ebullets.push(Object.assign({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r,spr,
    ang:ang+Math.PI/2,spin:0,grazed:false},extra||{}));
}

const TAU=Math.PI*2;
const attacks=[
  { name:'通常符', type:'normal', hp:520, time:60*22,
    update(t){
      // slow expanding rings
      if(t%52===0){ const n=20, base=(t*0.013); for(let i=0;i<n;i++){ fireE(boss.x,boss.y,base+i*TAU/n,1.7,SPR.orbWhite,5);} }
      // aimed 5-way petals
      if(t%64===0 && t>30){ const a=aim(); for(let i=-2;i<=2;i++) fireE(boss.x,boss.y,a+i*0.16,2.9,SPR.petalPink,5); }
    }},

  { name:'桜符「ふにふに満開」', type:'spell', hp:980, time:60*40,
    update(t){
      // blooming spiral arms
      if(t%4===0){ const arms=5, base=t*0.11; for(let k=0;k<arms;k++){ fireE(boss.x,boss.y, base+k*TAU/arms, 2.15, (k%2?SPR.petalPink:SPR.petalWhite),5,{spin:0.05}); } }
      // counter-rotating arms
      if(t%4===0){ const arms=4, base=-t*0.083+1; for(let k=0;k<arms;k++){ fireE(boss.x,boss.y, base+k*TAU/arms, 1.8, SPR.petalDeep,5,{spin:-0.04}); } }
      // periodic full-bloom burst aimed at player
      if(t%150===80){ const a=aim(), n=14; for(let i=0;i<n;i++){ fireE(boss.x,boss.y, a-0.55+i*(1.1/(n-1)), 3.2, SPR.petalWhite,5);} }
    }},

  { name:'通常符', type:'normal', hp:640, time:60*22,
    update(t){
      // sweeping whip
      if(t%6===0){ const sweep=Math.sin(t*0.05)*1.0; const a=aim()+sweep;
        fireE(boss.x,boss.y,a,2.5,SPR.orbPink,5); fireE(boss.x,boss.y,a+0.18,2.5,SPR.orbPink,5); }
      // slow wall from sides
      if(t%90===0){ for(let i=0;i<12;i++){ fireE(boss.x,boss.y, Math.PI/2 - 0.9 + i*(1.8/11), 1.5, SPR.orbWhite,5);} }
    }},

  { name:'宴符「ふにふにお花見」', type:'spell', hp:1280, time:60*46,
    update(t){
      // butterfly wing parametric streams
      if(t%3===0){
        const th=(t*0.08);
        // butterfly curve r(θ)
        for(let s=0;s<2;s++){
          const dir = s? -1:1;
          const ang = (t*0.06*dir) ;
          const r = Math.exp(Math.cos(th))-2*Math.cos(4*th)+Math.pow(Math.sin(th/12),5);
          const out = 1.4 + Math.abs(r)*0.55;
          fireE(boss.x,boss.y, ang, out, SPR.petalDeep,5,{spin:0.06*dir});
        }
      }
      // slow descending sakura curtain (grazeable)
      if(t%30===0){ const n=7; for(let i=0;i<n;i++){ const x=W*(i+0.5)/n + Math.sin(t*0.04+i)*16;
        ebullets.push({x:x,y:-8,vx:0,vy:1.05+Math.random()*0.4,r:5,spr:SPR.petalPink,ang:Math.random()*7,spin:0.03,grazed:false}); } }
      // aimed accent
      if(t%110===60){ const a=aim(); for(let i=-1;i<=1;i++) fireE(boss.x,boss.y,a+i*0.22,3.3,SPR.petalWhite,5);}
    }},
];

function startAttack(i){
  boss.idx=i; const a=attacks[i];
  boss.hp=a.hp; boss.hpMax=a.hp; boss.timer=a.time; boss.t=0;
  document.getElementById('atkName').textContent=a.name;
  const mAtk=document.getElementById('mAtkName'); if(mAtk) mAtk.textContent=a.name;
  const sn=document.getElementById('spellname');
  if(a.type==='spell'){ sn.textContent=a.name; sn.classList.add('show'); fieldFlash=22;
    cutin.t=0; cutin.dur=150; cutin.name=a.name; }
  else { sn.classList.remove('show'); }
  updatePips();
}
function updatePips(){
  ['pips','mPips'].forEach(id=>{
    const wrap=document.getElementById(id); if(!wrap) return; wrap.innerHTML='';
    attacks.forEach((a,i)=>{ const d=document.createElement('div'); d.className='pip'+(i<=boss.idx?' on':''); wrap.appendChild(d);});
  });
}

/* ---------- player actions ---------- */
function fireBomb(){
  if(state!=='playing' || bombs<=0 || player.invuln>60) return;
  bombs--; player.invuln=Math.max(player.invuln,200);
  // clear bullets into sparks + score
  for(const b of ebullets){ for(let k=0;k<1;k++) sparks.push(spark(b.x,b.y,'#f6c2d6')); score+=20; }
  ebullets.length=0;
  if(boss.alive && !boss.defeated){ boss.hp-=260; bossFlash=12; }
  fieldFlash=26;
  // petal burst from player
  for(let i=0;i<40;i++){ const a=Math.random()*TAU, sp=2+Math.random()*4;
    sparks.push({x:player.x,y:player.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:50,c:'#f6c2d6',petal:true,rot:Math.random()*7,vr:(Math.random()-.5)*.2,s:12});}
  syncHUD();
}
function spark(x,y,c){ const a=Math.random()*TAU, sp=1+Math.random()*2;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:18,c}; }

function loseLife(){
  lives--; player.invuln=140; player.deathT=1;
  for(let i=0;i<30;i++){ const a=Math.random()*TAU, sp=2+Math.random()*4;
    sparks.push({x:player.x,y:player.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:40,c:'#fff',petal:Math.random()<.5,rot:Math.random()*7,vr:(Math.random()-.5)*.2,s:10});}
  // small clear around player
  for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i]; if(Math.hypot(b.x-player.x,b.y-player.y)<80){ sparks.push(spark(b.x,b.y,'#fff')); ebullets.splice(i,1);} }
  player.x=W/2; player.y=H-90;
  if(lives<0){ endGame(false); }
  syncHUD();
}

/* ---------- update ---------- */
function update(){
  frame++;
  // ambient petals (always)
  for(const p of bgpetals){ p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr; if(p.y>H+20){ Object.assign(p,newBgPetal(-20)); } }

  if(state!=='playing'){ return; }

  // boss intro / movement
  if(boss.intro>0){ boss.intro--; }
  boss.bob+=0.03;
  boss.baseX = W/2 + Math.sin(frame*0.012)*70;
  boss.x += (boss.baseX-boss.x)*0.04;
  boss.y = 150 + Math.sin(boss.bob)*10;

  // run attack
  if(boss.alive && !boss.defeated && boss.intro<=0){
    boss.t++; boss.timer--;
    attacks[boss.idx].update(boss.t);
    if(boss.hp<=0){ capturePhase(true); }
    else if(boss.timer<=0){ capturePhase(false); }
  }
  if(bossFlash>0) bossFlash--;
  if(fieldFlash>0) fieldFlash--;
  if(cutin.t<cutin.dur) cutin.t++;

  // ----- player movement -----
  const focus = !!keys['shift'] || touch.focus;
  player.focus=focus;
  const sp = focus?2.0:4.3;
  if(!touch.active){
    let dx=0,dy=0;
    if(keys['arrowleft']||keys['a']) dx-=1;
    if(keys['arrowright']||keys['d']) dx+=1;
    if(keys['arrowup']||keys['w']) dy-=1;
    if(keys['arrowdown']||keys['s']) dy+=1;
    if(dx&&dy){ dx*=0.707; dy*=0.707; }
    player.x+=dx*sp; player.y+=dy*sp;
  }
  player.x=Math.max(10,Math.min(W-10,player.x));
  player.y=Math.max(10,Math.min(H-10,player.y));
  if(keys['x']) fireBomb();

  // ----- player auto-fire -----
  if(player.fireCd>0) player.fireCd--;
  if(player.fireCd<=0 && !boss.defeated){
    player.fireCd=5;
    if(focus){ pbullets.push(pb(player.x-6),pb(player.x+6)); }
    else { pbullets.push(pb(player.x), pb(player.x-12,-0.12), pb(player.x+12,0.12)); }
  }
  for(let i=pbullets.length-1;i>=0;i--){ const b=pbullets[i]; b.x+=b.vx; b.y+=b.vy;
    if(b.y<-20) { pbullets.splice(i,1); continue; }
    // hit boss
    if(boss.alive && !boss.defeated && boss.intro<=0 && Math.hypot(b.x-boss.x,b.y-boss.y)<26){
      boss.hp-=b.dmg; bossFlash=Math.max(bossFlash,4); pbullets.splice(i,1);
      sparks.push({x:b.x,y:b.y,vx:0,vy:-1,life:8,c:'#fff6fb'});
    }
  }

  // ----- enemy bullets -----
  if(player.invuln>0) player.invuln--;
  for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i];
    b.x+=b.vx; b.y+=b.vy; b.ang+=b.spin||0;
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+40){ ebullets.splice(i,1); continue; }
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(player.invuln<=0){
      if(d < b.r*0.55 + player.r){ ebullets.splice(i,1); loseLife(); continue; }
      if(!b.grazed && d < 16){ b.grazed=true; graze++; score+=12; sparks.push({x:player.x,y:player.y,vx:0,vy:0,life:10,c:'#f6c2d6'}); }
    }
  }

  // sparks
  for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.x+=s.vx||0; s.y+=s.vy||0;
    if(s.petal){ s.vy+=0.04; s.rot+=s.vr; } s.life--; if(s.life<=0) sparks.splice(i,1); }

  if(frame%6===0) syncHUD();
}

function pb(x,ang){ return {x:x,y:player.y-12,vx:ang?Math.sin(ang)*9:0,vy:-9.2,dmg:6}; }

function capturePhase(captured){
  if(captured) score+=5000; else score+=1500;
  // spell break burst
  for(const b of ebullets){ sparks.push(spark(b.x,b.y,'#f6c2d6')); }
  ebullets.length=0;
  for(let i=0;i<50;i++){ const a=Math.random()*TAU, s=1+Math.random()*4.5;
    sparks.push({x:boss.x,y:boss.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:60,c:i%2?'#f6c2d6':'#fff',petal:Math.random()<.6,rot:Math.random()*7,vr:(Math.random()-.5)*.2,s:12});}
  fieldFlash=24; bossFlash=10;
  if(boss.idx+1<attacks.length){ startAttack(boss.idx+1); }
  else { boss.defeated=true; boss.deathT=1; setTimeout(()=>endGame(true),1600); }
  syncHUD();
}

/* ---------- draw ---------- */
function draw(){
  ctx.clearRect(0,0,W,H);
  // field background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#241430'); g.addColorStop(0.5,'#190f22'); g.addColorStop(1,'#0c0712');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // spell glow behind boss
  if(state==='playing' && attacks[boss.idx] && attacks[boss.idx].type==='spell' && !boss.defeated){
    const rg=ctx.createRadialGradient(boss.x,boss.y,0,boss.x,boss.y,260);
    rg.addColorStop(0,'rgba(233,143,178,0.20)'); rg.addColorStop(1,'rgba(233,143,178,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }

  // ambient bg petals
  for(const p of bgpetals){ ctx.save(); ctx.globalAlpha=p.a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.drawImage(SPR.petalPink,-p.s/2,-p.s/2,p.s,p.s); ctx.restore(); }

  // boss portrait
  if(state==='playing' && portraitReady && boss.alive){
    const pw=180, ph=pw*(portraitImg.height/portraitImg.width);
    ctx.save();
    ctx.imageSmoothingEnabled=false;
    let alpha=1;
    if(boss.defeated){ boss.deathT+=0.018; alpha=Math.max(0,1-boss.deathT); }
    if(boss.intro>0){ alpha*=1-(boss.intro/60); }
    ctx.globalAlpha=alpha*0.96;
    // aura
    const ar=ctx.createRadialGradient(boss.x,boss.y+10,0,boss.x,boss.y+10,150);
    ar.addColorStop(0,'rgba(246,194,214,'+(0.16+(bossFlash>0?0.25:0))+')');
    ar.addColorStop(1,'rgba(246,194,214,0)');
    ctx.fillStyle=ar; ctx.fillRect(boss.x-160,boss.y-150,320,320);
    if(bossFlash>0){ ctx.globalAlpha=alpha*Math.min(1,bossFlash/8)*0.5;
      ctx.drawImage(portraitImg, boss.x-pw/2, boss.y-ph*0.40, pw,ph);
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=alpha*0.9;
    }
    ctx.drawImage(portraitImg, boss.x-pw/2, boss.y-ph*0.40, pw,ph);
    ctx.restore();
  }

  // player bullets
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const b of pbullets){
    ctx.fillStyle='rgba(255,214,232,0.9)';
    ctx.beginPath(); ctx.ellipse(b.x,b.y,2.4,7,0,0,TAU); ctx.fill();
  }
  ctx.restore();

  // enemy bullets
  for(const b of ebullets){ ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.ang);
    const sz=b.spr.width; ctx.drawImage(b.spr,-sz/2,-sz/2); ctx.restore(); }

  // sparks
  for(const s of sparks){ ctx.save();
    if(s.petal){ ctx.globalAlpha=Math.min(1,s.life/30); ctx.translate(s.x,s.y); ctx.rotate(s.rot);
      ctx.drawImage(SPR.petalPink,-(s.s||10)/2,-(s.s||10)/2,s.s||10,s.s||10);
    } else { ctx.globalAlpha=Math.min(1,s.life/14); ctx.fillStyle=s.c;
      ctx.beginPath(); ctx.arc(s.x,s.y,2,0,TAU); ctx.fill(); }
    ctx.restore(); }

  // player
  if(state==='playing' && lives>=0){
    const blink = player.invuln>0 && (frame%8<4);
    ctx.save();
    if(!blink){
      // soft halo
      const pr=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,16);
      pr.addColorStop(0,'rgba(255,246,251,0.9)'); pr.addColorStop(1,'rgba(246,194,214,0)');
      ctx.fillStyle=pr; ctx.beginPath(); ctx.arc(player.x,player.y,16,0,TAU); ctx.fill();
      // body diamond
      ctx.fillStyle='#fff6fb'; ctx.translate(player.x,player.y); ctx.rotate(Math.PI/4);
      ctx.fillRect(-5,-5,10,10);
      ctx.restore(); ctx.save();
      // focus ring + hitbox
      if(player.focus){
        ctx.strokeStyle='rgba(246,194,214,0.85)'; ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.arc(player.x,player.y,12,frame*0.06,frame*0.06+5); ctx.stroke();
        ctx.fillStyle='#ff486f'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,TAU); ctx.fill();
      }
    }
    ctx.restore();
  }

  // field flash
  if(fieldFlash>0){ ctx.fillStyle='rgba(246,194,214,'+(fieldFlash/26*0.18)+')'; ctx.fillRect(0,0,W,H); }

  // spell-card cut-in (立ち絵) — Touhou-style declaration
  if(state==='playing' && cutin.t<cutin.dur && portraitReady){
    const p=cutin.t/cutin.dur;
    let a=1, slide=1;
    if(p<0.16){ const k=p/0.16; a=k; slide=1-Math.pow(1-k,3); }
    else if(p>=0.78){ const k=(p-0.78)/0.22; a=1-k; slide=1+k*0.18; }
    ctx.save();
    ctx.fillStyle='rgba(8,4,12,'+(a*0.30)+')'; ctx.fillRect(0,0,W,H);
    // diagonal pink sash
    ctx.globalAlpha=a*0.55;
    const sg=ctx.createLinearGradient(0,H*0.30,W,H*0.64);
    sg.addColorStop(0,'rgba(246,194,214,0)'); sg.addColorStop(0.5,'rgba(246,150,190,0.6)'); sg.addColorStop(1,'rgba(246,194,214,0)');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(0,H*0.34); ctx.lineTo(W,H*0.50); ctx.lineTo(W,H*0.66); ctx.lineTo(0,H*0.50); ctx.closePath(); ctx.fill();
    // portrait sliding in from right
    const ph=302, pw=ph*(portraitImg.width/portraitImg.height);
    const restCX=W-104, offCX=W+pw*0.75, cx=offCX+(restCX-offCX)*slide, cy=H*0.45;
    ctx.globalAlpha=a;
    const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,pw);
    gg.addColorStop(0,'rgba(246,194,214,'+(a*0.25)+')'); gg.addColorStop(1,'rgba(246,194,214,0)');
    ctx.fillStyle=gg; ctx.fillRect(cx-pw,cy-ph*0.7,pw*2,ph*1.4);
    ctx.imageSmoothingEnabled=true;
    ctx.globalAlpha=a*0.96;
    ctx.drawImage(portraitImg, cx-pw/2, cy-ph/2, pw, ph);
    // spell name (rounded gothic), lower-left
    ctx.globalAlpha=a; ctx.textAlign='left';
    ctx.fillStyle='rgba(216,180,138,0.95)';
    ctx.font='700 11px "M PLUS Rounded 1c",sans-serif';
    ctx.fillText('SPELL  CARD', 30, H*0.72-24);
    ctx.font='800 24px "M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillStyle='#fff0f6'; ctx.shadowColor='rgba(233,143,178,0.95)'; ctx.shadowBlur=14;
    ctx.fillText(cutin.name, 30, H*0.72);
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(246,150,190,'+a+')'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(30,H*0.72+10); ctx.lineTo(30+ctx.measureText(cutin.name).width,H*0.72+10); ctx.stroke();
    ctx.restore();
  }

  // intro caption
  if(state==='playing' && boss.intro>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,boss.intro/60)*Math.min(1,(60-boss.intro)/20+0.2);
    ctx.fillStyle='#f6c2d6'; ctx.textAlign='center';
    ctx.font='800 30px "M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif'; ctx.fillText('ふ に さ ん', W/2, H/2-10);
    ctx.font='600 12px "M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif'; ctx.fillStyle='#d8b48a';
    ctx.fillText('ふにふにする程度の能力', W/2, H/2+16);
    ctx.restore();
  }
}

/* ---------- HUD ---------- */
function syncHUD(){
  const hpw=(boss.defeated?0:Math.max(0,boss.hp/boss.hpMax*100))+'%';
  const livesStr = lives>=0 ? ('✿'.repeat(Math.max(0,lives))||'—') : '—';
  const bombsStr = '❀'.repeat(Math.max(0,bombs))||'—';
  const scoreStr = score.toLocaleString();
  document.getElementById('hpfill').style.width=hpw;
  document.getElementById('score').textContent=scoreStr;
  document.getElementById('graze').textContent=graze;
  document.getElementById('lives').textContent=livesStr;
  document.getElementById('bombs').textContent=bombsStr;
  const mh=document.getElementById('mHpfill'); if(mh) mh.style.width=hpw;
  const msc=document.getElementById('mScore'); if(msc) msc.textContent=scoreStr;
  const ml=document.getElementById('mLives'); if(ml) ml.textContent=livesStr;
  const mb=document.getElementById('mBombs'); if(mb) mb.textContent=bombsStr;
}

/* ---------- loop ---------- */
function loop(){ update(); draw(); requestAnimationFrame(loop); }

/* ---------- start / end ---------- */
function startGame(){
  state='playing'; frame=0; score=0; graze=0; lives=3; bombs=3;
  cutin.t=0; cutin.dur=0;
  pbullets=[]; ebullets=[]; sparks=[];
  Object.assign(player,{x:W/2,y:H-90,fireCd:0,invuln:140,focus:false});
  Object.assign(boss,{x:W/2,baseX:W/2,y:150,defeated:false,intro:90,bob:0,deathT:0,alive:true});
  startAttack(0);
  document.getElementById('ovTitle').classList.add('hidden');
  document.getElementById('ovEnd').classList.add('hidden');
  syncHUD();
}
function endGame(win){
  state='ended';
  const ov=document.getElementById('ovEnd');
  const rt=document.getElementById('resultText'), rs=document.getElementById('resultSub');
  if(win){ rt.textContent='夢 幻 即 ち 空'; rt.className='result mincho win';
    rs.innerHTML='満開の夜桜を見事に舞い抜けた。<br>SCORE　'+score.toLocaleString()+'　/　GRAZE　'+graze; }
  else { rt.textContent='儚 き 夢'; rt.className='result mincho lose';
    rs.innerHTML='ふにさんのふにふにに呑まれてしまった。<br>SCORE　'+score.toLocaleString(); }
  ov.classList.remove('hidden');
  document.getElementById('spellname').classList.remove('show');
}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;

updatePips();
loop();
</script>
